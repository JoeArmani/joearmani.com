<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 860" role="img" aria-labelledby="pipeTitle pipeDesc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13">
  <title id="pipeTitle">Automated, AI-generated email pipeline architecture</title>
  <desc id="pipeDesc">A marketing vendor's recipient export is filtered by prep, handed to a manual Claude Sonnet generation session and a manual Claude Opus review session, imported to JSON, approved by a human, sent through SendGrid, and reported on via SendGrid's Activity API. SKILL.md governs both Claude sessions. Filesystem artifacts persist at every stage.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .lane { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .laneLabel { fill: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
      .cli { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.5; }
      .manual { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .gate { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; }
      .ext { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; }
      .gov { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 1.5; }
      .art { fill: #ecfccb; stroke: #4d7c0f; stroke-width: 1.25; }
      .util { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.25; }
      .err { fill: #fef2f2; stroke: #991b1b; stroke-width: 1; stroke-dasharray: 3 3; }
      .head { font-weight: 700; fill: #0f172a; font-size: 14px; }
      .lbl { fill: #0f172a; font-weight: 600; }
      .sub { fill: #334155; font-size: 11.5px; }
      .mono { fill: #4338ca; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 11px; }
      .artMono { fill: #3f6212; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 10.5px; }
      .note { fill: #475569; font-size: 11px; font-style: italic; }
      .conn { stroke: #334155; stroke-width: 1.5; fill: none; }
      .connDash { stroke: #64748b; stroke-width: 1.25; fill: none; stroke-dasharray: 5 4; }
      .govArrow { stroke: #7c3aed; stroke-width: 1.25; fill: none; stroke-dasharray: 4 3; }
      .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .legendTitle { font-size: 11px; font-weight: 700; fill: #334155; letter-spacing: 0.06em; text-transform: uppercase; }
      .legendText { fill: #334155; font-size: 11.5px; }
    </style>
  </defs>

  <text x="660" y="30" text-anchor="middle" class="title">Automated, AI-Generated Email Pipeline Architecture</text>
  <text x="660" y="50" text-anchor="middle" class="subtitle">Python CLI · Manual Claude sessions · SendGrid · Filesystem-persisted state</text>

  <!-- ============ LANE 1: External systems ============ -->
  <rect class="lane" x="10" y="70" width="1300" height="90" rx="8"/>
  <text x="22" y="86" class="laneLabel">External systems</text>

  <g>
    <rect class="ext" x="20" y="96" width="180" height="56" rx="8"/>
    <text x="110" y="117" text-anchor="middle" class="lbl">Marketing Vendor</text>
    <text x="110" y="133" text-anchor="middle" class="sub">XLSX export</text>
    <text x="110" y="147" text-anchor="middle" class="sub">delivered · opened · clicked</text>
  </g>

  <g>
    <rect class="ext" x="220" y="96" width="360" height="56" rx="8"/>
    <text x="400" y="117" text-anchor="middle" class="lbl">Anthropic API</text>
    <text x="400" y="133" text-anchor="middle" class="mono">Sonnet · Opus</text>
    <text x="400" y="147" text-anchor="middle" class="sub">generation + review · structured markdown output</text>
  </g>

  <g>
    <rect class="ext" x="900" y="96" width="170" height="56" rx="8"/>
    <text x="985" y="117" text-anchor="middle" class="lbl">SendGrid Send</text>
    <text x="985" y="133" text-anchor="middle" class="mono">POST /v3/mail/send</text>
    <text x="985" y="147" text-anchor="middle" class="sub">HTML · signature · UTM</text>
  </g>

  <g>
    <rect class="ext" x="1090" y="96" width="210" height="56" rx="8"/>
    <text x="1195" y="117" text-anchor="middle" class="lbl">SendGrid Activity</text>
    <text x="1195" y="133" text-anchor="middle" class="mono">GET /v3/messages</text>
    <text x="1195" y="147" text-anchor="middle" class="sub">delivered · open · click · bounce</text>
  </g>

  <!-- ============ LANE 2: Pipeline stages ============ -->
  <rect class="lane" x="10" y="180" width="1300" height="140" rx="8"/>
  <text x="22" y="196" class="laneLabel">Pipeline stages (left → right)</text>

  <!-- prep -->
  <g>
    <rect class="cli" x="20" y="210" width="160" height="92" rx="8"/>
    <text x="100" y="232" text-anchor="middle" class="lbl">prep</text>
    <text x="100" y="248" text-anchor="middle" class="mono">python -m cls_email prep</text>
    <text x="100" y="266" text-anchor="middle" class="sub">ingest XLSX</text>
    <text x="100" y="280" text-anchor="middle" class="sub">filter chain ↓</text>
    <text x="100" y="294" text-anchor="middle" class="sub">emit generation prompt</text>
  </g>

  <!-- sonnet session -->
  <g>
    <rect class="manual" x="200" y="210" width="170" height="92" rx="8"/>
    <text x="285" y="232" text-anchor="middle" class="lbl">Sonnet session</text>
    <text x="285" y="248" text-anchor="middle" class="note">manual, in Claude app</text>
    <text x="285" y="266" text-anchor="middle" class="sub">paste prompt + batch data</text>
    <text x="285" y="280" text-anchor="middle" class="sub">generate ≈90 drafts</text>
    <text x="285" y="294" text-anchor="middle" class="sub">applies SKILL.md rules</text>
  </g>

  <!-- opus review -->
  <g>
    <rect class="manual" x="390" y="210" width="170" height="92" rx="8"/>
    <text x="475" y="232" text-anchor="middle" class="lbl">Opus review</text>
    <text x="475" y="248" text-anchor="middle" class="note">manual, separate session</text>
    <text x="475" y="266" text-anchor="middle" class="sub">voice + structure check</text>
    <text x="475" y="280" text-anchor="middle" class="sub">tier verification</text>
    <text x="475" y="294" text-anchor="middle" class="sub">rewrites in-place</text>
  </g>

  <!-- import -->
  <g>
    <rect class="cli" x="580" y="210" width="140" height="92" rx="8"/>
    <text x="650" y="232" text-anchor="middle" class="lbl">import</text>
    <text x="650" y="248" text-anchor="middle" class="mono">cls_email import</text>
    <text x="650" y="266" text-anchor="middle" class="sub">parse reviewed md</text>
    <text x="650" y="280" text-anchor="middle" class="sub">strict JSON contract</text>
    <text x="650" y="294" text-anchor="middle" class="sub">fail loud on drift</text>
  </g>

  <!-- approve (human gate) -->
  <g>
    <rect class="gate" x="740" y="210" width="140" height="92" rx="8"/>
    <text x="810" y="232" text-anchor="middle" class="lbl">approve</text>
    <text x="810" y="248" text-anchor="middle" class="mono">cls_email approve</text>
    <text x="810" y="264" text-anchor="middle" class="sub">human gate</text>
    <text x="810" y="278" text-anchor="middle" class="sub">last-mile review</text>
    <text x="810" y="294" text-anchor="middle" class="sub">flips ready-to-send</text>
  </g>

  <!-- send -->
  <g>
    <rect class="cli" x="900" y="210" width="170" height="92" rx="8"/>
    <text x="985" y="232" text-anchor="middle" class="lbl">send</text>
    <text x="985" y="248" text-anchor="middle" class="mono">cls_email send</text>
    <text x="985" y="266" text-anchor="middle" class="sub">render HTML + sig + UTM</text>
    <text x="985" y="280" text-anchor="middle" class="sub">5–15s randomized jitter</text>
    <text x="985" y="294" text-anchor="middle" class="sub">SendGrid dispatch</text>
  </g>

  <!-- report -->
  <g>
    <rect class="cli" x="1090" y="210" width="210" height="92" rx="8"/>
    <text x="1195" y="232" text-anchor="middle" class="lbl">report</text>
    <text x="1195" y="248" text-anchor="middle" class="mono">cls_email report</text>
    <text x="1195" y="266" text-anchor="middle" class="sub">query Activity API</text>
    <text x="1195" y="280" text-anchor="middle" class="sub">XLSX w/ conditional fmt</text>
    <text x="1195" y="294" text-anchor="middle" class="sub">per-recipient outcomes</text>
  </g>

  <!-- Pipeline arrows -->
  <path class="conn" d="M180 256 L200 256" marker-end="url(#ar)"/>
  <path class="conn" d="M370 256 L390 256" marker-end="url(#ar)"/>
  <path class="conn" d="M560 256 L580 256" marker-end="url(#ar)"/>
  <path class="conn" d="M720 256 L740 256" marker-end="url(#ar)"/>
  <path class="conn" d="M880 256 L900 256" marker-end="url(#ar)"/>
  <path class="conn" d="M1070 256 L1090 256" marker-end="url(#ar)"/>

  <!-- External → pipeline arrows -->
  <path class="connDash" d="M110 152 L110 210" marker-end="url(#arDash)"/>
  <text x="116" y="175" class="note">XLSX in</text>
  <path class="connDash" d="M300 152 L285 210" marker-end="url(#arDash)"/>
  <path class="connDash" d="M500 152 L475 210" marker-end="url(#arDash)"/>
  <path class="connDash" d="M985 152 L985 210" marker-end="url(#arDash)"/>
  <path class="connDash" d="M1195 152 L1195 210" marker-end="url(#arDash)"/>

  <!-- ============ LANE 3: prep filter chain + tiers + SKILL.md ============ -->
  <rect class="lane" x="10" y="340" width="1300" height="160" rx="8"/>
  <text x="22" y="356" class="laneLabel">Governance &amp; pre-generation transforms</text>

  <!-- Filter chain -->
  <g>
    <rect class="cli" x="20" y="370" width="540" height="120" rx="8"/>
    <text x="40" y="390" class="head">prep filter chain</text>
    <text x="40" y="408" class="sub">Every recipient row runs through these gates, in order:</text>

    <g font-size="11.5">
      <rect x="36" y="420" width="96" height="26" rx="4" fill="#ffffff" stroke="#4338ca"/>
      <text x="84" y="437" text-anchor="middle" class="lbl">opt-out</text>

      <rect x="146" y="420" width="120" height="26" rx="4" fill="#ffffff" stroke="#4338ca"/>
      <text x="206" y="437" text-anchor="middle" class="lbl">cooldown 30d</text>

      <rect x="280" y="420" width="130" height="26" rx="4" fill="#ffffff" stroke="#4338ca"/>
      <text x="345" y="437" text-anchor="middle" class="lbl">skip personal</text>

      <rect x="424" y="420" width="118" height="26" rx="4" fill="#ffffff" stroke="#4338ca"/>
      <text x="483" y="437" text-anchor="middle" class="lbl">tier split</text>

      <path class="conn" d="M132 433 L146 433" marker-end="url(#ar)"/>
      <path class="conn" d="M266 433 L280 433" marker-end="url(#ar)"/>
      <path class="conn" d="M410 433 L424 433" marker-end="url(#ar)"/>
    </g>

    <text x="40" y="466" class="sub">tier split routes by engagement: <tspan class="mono">clicked → T3</tspan>, <tspan class="mono">opened → T2</tspan>, <tspan class="mono">delivered → T1</tspan></text>
    <text x="40" y="482" class="note">rejected rows land in suppressed / cooled / skipped buckets — not silently dropped</text>
  </g>

  <!-- Personalization tiers -->
  <g>
    <rect class="cli" x="580" y="370" width="360" height="120" rx="8"/>
    <text x="600" y="390" class="head">Personalization tiers</text>
    <text x="600" y="410" class="sub"><tspan class="lbl">Tier 1 —</tspan> name + topic (baseline)</text>
    <text x="600" y="428" class="sub"><tspan class="lbl">Tier 2 —</tspan> + company + industry angle (default)</text>
    <text x="600" y="446" class="sub"><tspan class="lbl">Tier 3 —</tspan> + research signal (funding, migration, hiring)</text>
    <text x="600" y="470" class="note">Sonnet targets the tier · Opus verifies it was actually delivered</text>
  </g>

  <!-- SKILL.md governance -->
  <g>
    <rect class="gov" x="960" y="370" width="340" height="120" rx="8"/>
    <text x="980" y="390" class="head">SKILL.md — single source of truth</text>
    <text x="980" y="410" class="sub">~200-line governance file covering:</text>
    <text x="980" y="426" class="sub">voice rules · greeting format · CTA library</text>
    <text x="980" y="442" class="sub">subject variation · case-study rotation</text>
    <text x="980" y="458" class="sub">parser contract · personalization tiers</text>
    <text x="980" y="478" class="note">loaded into both Sonnet &amp; Opus sessions</text>
  </g>

  <!-- SKILL.md governance arrows into the Sonnet & Opus boxes -->
  <path class="govArrow" d="M960 380 C 700 360, 450 320, 285 302" marker-end="url(#arDash)"/>
  <path class="govArrow" d="M960 410 C 750 380, 600 330, 475 302" marker-end="url(#arDash)"/>

  <!-- ============ LANE 4: Filesystem artifacts ============ -->
  <rect class="lane" x="10" y="520" width="1300" height="100" rx="8"/>
  <text x="22" y="536" class="laneLabel">Filesystem artifacts persisted at each stage</text>

  <g>
    <rect class="art" x="20" y="548" width="160" height="56" rx="6"/>
    <text x="100" y="568" text-anchor="middle" class="lbl">prep output</text>
    <text x="100" y="584" text-anchor="middle" class="artMono">batches/NNN.prep.json</text>
    <text x="100" y="598" text-anchor="middle" class="artMono">NNN.prompt.md</text>
  </g>
  <g>
    <rect class="art" x="200" y="548" width="170" height="56" rx="6"/>
    <text x="285" y="568" text-anchor="middle" class="lbl">Sonnet output</text>
    <text x="285" y="584" text-anchor="middle" class="artMono">NNN.generated.md</text>
    <text x="285" y="598" text-anchor="middle" class="note">saved by hand</text>
  </g>
  <g>
    <rect class="art" x="390" y="548" width="170" height="56" rx="6"/>
    <text x="475" y="568" text-anchor="middle" class="lbl">Opus output</text>
    <text x="475" y="584" text-anchor="middle" class="artMono">NNN.reviewed.md</text>
    <text x="475" y="598" text-anchor="middle" class="note">canonical pre-send copy</text>
  </g>
  <g>
    <rect class="art" x="580" y="548" width="140" height="56" rx="6"/>
    <text x="650" y="568" text-anchor="middle" class="lbl">parsed batch</text>
    <text x="650" y="584" text-anchor="middle" class="artMono">NNN.json</text>
    <text x="650" y="598" text-anchor="middle" class="sub">typed records</text>
  </g>
  <g>
    <rect class="art" x="740" y="548" width="140" height="56" rx="6"/>
    <text x="810" y="568" text-anchor="middle" class="lbl">approval flag</text>
    <text x="810" y="584" text-anchor="middle" class="artMono">status: approved</text>
    <text x="810" y="598" text-anchor="middle" class="sub">timestamp + operator</text>
  </g>
  <g>
    <rect class="art" x="900" y="548" width="170" height="56" rx="6"/>
    <text x="985" y="568" text-anchor="middle" class="lbl">send records</text>
    <text x="985" y="584" text-anchor="middle" class="artMono">NNN.sent.jsonl</text>
    <text x="985" y="598" text-anchor="middle" class="sub">per-email SendGrid id</text>
  </g>
  <g>
    <rect class="art" x="1090" y="548" width="210" height="56" rx="6"/>
    <text x="1195" y="568" text-anchor="middle" class="lbl">report artifact</text>
    <text x="1195" y="584" text-anchor="middle" class="artMono">NNN.report.xlsx</text>
    <text x="1195" y="598" text-anchor="middle" class="sub">conditional formatting</text>
  </g>

  <!-- persistence arrows (stage → artifact, dashed) -->
  <path class="connDash" d="M100 302 L100 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M285 302 L285 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M475 302 L475 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M650 302 L650 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M810 302 L810 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M985 302 L985 548" marker-end="url(#arDash)"/>
  <path class="connDash" d="M1195 302 L1195 548" marker-end="url(#arDash)"/>

  <!-- ============ Utility commands row ============ -->
  <g>
    <rect class="util" x="20" y="640" width="260" height="56" rx="6"/>
    <text x="40" y="660" class="lbl">optout</text>
    <text x="40" y="676" class="sub">maintain suppression list</text>
    <text x="40" y="690" class="note">writes to opt-out filter gate in prep</text>
  </g>
  <g>
    <rect class="util" x="300" y="640" width="260" height="56" rx="6"/>
    <text x="320" y="660" class="lbl">batches</text>
    <text x="320" y="676" class="sub">inspect all batch states</text>
    <text x="320" y="690" class="note">read-only view over the filesystem</text>
  </g>

  <g>
    <rect class="err" x="580" y="640" width="370" height="56" rx="6"/>
    <text x="600" y="660" class="lbl">Error paths (detailed in state diagram)</text>
    <text x="600" y="676" class="sub">parse_failed · rejected · send_failed · bounced</text>
    <text x="600" y="690" class="note">every failure routes back to a recoverable state</text>
  </g>

  <g>
    <rect x="970" y="640" width="330" height="56" rx="6" fill="#fffbeb" stroke="#b45309"/>
    <text x="990" y="660" class="lbl">Human gates</text>
    <text x="990" y="676" class="sub">Sonnet · Opus · approve — no automated send</text>
    <text x="990" y="690" class="note">the pipeline is designed to fail safe, not move fast</text>
  </g>

  <!-- ============ Legend ============ -->
  <g transform="translate(20,720)">
    <text x="0" y="0" class="legendTitle">Legend</text>
    <rect class="cli" x="0" y="10" width="18" height="14" rx="3"/>
    <text x="26" y="22" class="legendText">Python CLI command</text>

    <rect class="manual" x="180" y="10" width="18" height="14" rx="3"/>
    <text x="206" y="22" class="legendText">Manual Claude session</text>

    <rect class="gate" x="370" y="10" width="18" height="14" rx="3"/>
    <text x="396" y="22" class="legendText">Human gate</text>

    <rect class="ext" x="500" y="10" width="18" height="14" rx="3"/>
    <text x="526" y="22" class="legendText">External API / input</text>

    <rect class="gov" x="660" y="10" width="18" height="14" rx="3"/>
    <text x="686" y="22" class="legendText">Governance file</text>

    <rect class="art" x="800" y="10" width="18" height="14" rx="3"/>
    <text x="826" y="22" class="legendText">Filesystem artifact</text>

    <rect class="util" x="950" y="10" width="18" height="14" rx="3"/>
    <text x="976" y="22" class="legendText">Utility command</text>

    <rect class="err" x="1090" y="10" width="18" height="14" rx="3"/>
    <text x="1116" y="22" class="legendText">Error / recovery path</text>
  </g>

  <text x="660" y="830" text-anchor="middle" class="note">Dashed lines show persistence (stage → artifact) or governance (SKILL.md → Claude sessions). Solid lines are data flow.</text>
</svg>
