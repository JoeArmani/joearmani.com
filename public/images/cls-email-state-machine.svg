<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 720" role="img" aria-labelledby="smTitle smDesc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13">
  <title id="smTitle">CLS email pipeline batch state machine</title>
  <desc id="smDesc">Every batch moves through eight canonical states — prepped, generated, reviewed, merged, approved, sending, sent, reported — with six recoverable error states (suppressed, cooled, parse_failed, rejected, send_failed, bounced). Transitions are triggered by CLI commands or manual Claude sessions. Two transitions are explicit human gates: Opus review and approve. Every state persists to disk as JSON so interrupted workflows resume cleanly.</desc>
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <style>
      .state { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.8; }
      .manualState { fill: #fef3c7; stroke: #b45309; stroke-width: 1.8; stroke-dasharray: 6 4; }
      .humanGate { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2.2; }
      .terminalOk { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .errState { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .note { fill: #475569; font-size: 11px; font-style: italic; }
      .label { fill: #0f172a; font-weight: 700; font-size: 14px; }
      .sub { fill: #334155; font-size: 11.5px; }
      .mono { fill: #4338ca; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 10.5px; }
      .artMono { fill: #3f6212; font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 10.5px; }
      .trans { fill: #334155; font-size: 12px; font-weight: 600; }
      .transNote { fill: #64748b; font-size: 10.5px; font-style: italic; }
      .transErr { fill: #b91c1c; font-size: 11px; font-weight: 600; }
      .conn { stroke: #334155; stroke-width: 1.6; fill: none; }
      .connErr { stroke: #b91c1c; stroke-width: 1.4; fill: none; stroke-dasharray: 5 4; }
      .connRetry { stroke: #15803d; stroke-width: 1.4; fill: none; stroke-dasharray: 3 3; }
      .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .sectionLabel { fill: #64748b; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .laneBg { fill: #f8fafc; stroke: #e2e8f0; }
      .legendT { fill: #334155; font-size: 11.5px; }
      .legendTitle { fill: #334155; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    </style>
  </defs>

  <text x="660" y="32" text-anchor="middle" class="title">Batch State Machine — Happy Path, Errors, and Recovery</text>
  <text x="660" y="52" text-anchor="middle" class="subtitle">Every transition persists state to disk. Any interrupted batch resumes exactly where it left off.</text>

  <!-- ================== HAPPY PATH ROW ================== -->
  <rect class="laneBg" x="10" y="80" width="1300" height="200" rx="10"/>
  <text x="22" y="98" class="sectionLabel">Happy path (left → right)</text>

  <!-- prepped -->
  <g>
    <rect class="state" x="30" y="120" width="140" height="90" rx="10"/>
    <text x="100" y="146" text-anchor="middle" class="label">prepped</text>
    <text x="100" y="165" text-anchor="middle" class="sub">filtered recipients</text>
    <text x="100" y="180" text-anchor="middle" class="sub">prompt emitted</text>
    <text x="100" y="198" text-anchor="middle" class="artMono">NNN.prep.json</text>
  </g>

  <!-- generated -->
  <g>
    <rect class="manualState" x="190" y="120" width="140" height="90" rx="10"/>
    <text x="260" y="146" text-anchor="middle" class="label">generated</text>
    <text x="260" y="165" text-anchor="middle" class="sub">Sonnet drafts</text>
    <text x="260" y="180" text-anchor="middle" class="sub">saved by hand</text>
    <text x="260" y="198" text-anchor="middle" class="artMono">NNN.generated.md</text>
  </g>

  <!-- reviewed -->
  <g>
    <rect class="manualState" x="350" y="120" width="140" height="90" rx="10"/>
    <text x="420" y="146" text-anchor="middle" class="label">reviewed</text>
    <text x="420" y="165" text-anchor="middle" class="sub">Opus-edited drafts</text>
    <text x="420" y="180" text-anchor="middle" class="sub">voice + tier verified</text>
    <text x="420" y="198" text-anchor="middle" class="artMono">NNN.reviewed.md</text>
  </g>

  <!-- merged -->
  <g>
    <rect class="state" x="510" y="120" width="140" height="90" rx="10"/>
    <text x="580" y="146" text-anchor="middle" class="label">merged</text>
    <text x="580" y="165" text-anchor="middle" class="sub">parsed to JSON</text>
    <text x="580" y="180" text-anchor="middle" class="sub">typed records</text>
    <text x="580" y="198" text-anchor="middle" class="artMono">NNN.json</text>
  </g>

  <!-- approved (human gate) -->
  <g>
    <rect class="humanGate" x="670" y="120" width="140" height="90" rx="10"/>
    <text x="740" y="146" text-anchor="middle" class="label">approved</text>
    <text x="740" y="165" text-anchor="middle" class="sub">human gate</text>
    <text x="740" y="180" text-anchor="middle" class="sub">ready-to-send flag</text>
    <text x="740" y="198" text-anchor="middle" class="artMono">status: approved</text>
  </g>

  <!-- sending -->
  <g>
    <rect class="state" x="830" y="120" width="140" height="90" rx="10"/>
    <text x="900" y="146" text-anchor="middle" class="label">sending</text>
    <text x="900" y="165" text-anchor="middle" class="sub">in-flight to SendGrid</text>
    <text x="900" y="180" text-anchor="middle" class="sub">5–15s jitter per email</text>
    <text x="900" y="198" text-anchor="middle" class="artMono">NNN.sending.jsonl</text>
  </g>

  <!-- sent -->
  <g>
    <rect class="state" x="990" y="120" width="140" height="90" rx="10"/>
    <text x="1060" y="146" text-anchor="middle" class="label">sent</text>
    <text x="1060" y="165" text-anchor="middle" class="sub">SendGrid accepted</text>
    <text x="1060" y="180" text-anchor="middle" class="sub">message id captured</text>
    <text x="1060" y="198" text-anchor="middle" class="artMono">NNN.sent.jsonl</text>
  </g>

  <!-- reported -->
  <g>
    <rect class="terminalOk" x="1150" y="120" width="140" height="90" rx="10"/>
    <text x="1220" y="146" text-anchor="middle" class="label">reported</text>
    <text x="1220" y="165" text-anchor="middle" class="sub">Activity API polled</text>
    <text x="1220" y="180" text-anchor="middle" class="sub">open · click · bounce</text>
    <text x="1220" y="198" text-anchor="middle" class="artMono">NNN.report.xlsx</text>
  </g>

  <!-- Happy-path arrows with command labels -->
  <path class="conn" d="M170 165 L190 165" marker-end="url(#ar3)"/>
  <text x="180" y="140" text-anchor="middle" class="trans">Sonnet</text>
  <text x="180" y="232" text-anchor="middle" class="transNote">manual session</text>

  <path class="conn" d="M330 165 L350 165" marker-end="url(#ar3)"/>
  <text x="340" y="140" text-anchor="middle" class="trans">Opus review</text>
  <text x="340" y="232" text-anchor="middle" class="transNote">manual · human gate</text>

  <path class="conn" d="M490 165 L510 165" marker-end="url(#ar3)"/>
  <text x="500" y="140" text-anchor="middle" class="trans">import</text>
  <text x="500" y="232" text-anchor="middle" class="transNote">strict JSON contract</text>

  <path class="conn" d="M650 165 L670 165" marker-end="url(#ar3)"/>
  <text x="660" y="140" text-anchor="middle" class="trans">approve</text>
  <text x="660" y="232" text-anchor="middle" class="transNote">human gate</text>

  <path class="conn" d="M810 165 L830 165" marker-end="url(#ar3)"/>
  <text x="820" y="140" text-anchor="middle" class="trans">send</text>
  <text x="820" y="232" text-anchor="middle" class="transNote">dispatch loop</text>

  <path class="conn" d="M970 165 L990 165" marker-end="url(#ar3)"/>
  <text x="980" y="140" text-anchor="middle" class="trans">ack</text>
  <text x="980" y="232" text-anchor="middle" class="transNote">per-email 2xx</text>

  <path class="conn" d="M1130 165 L1150 165" marker-end="url(#ar3)"/>
  <text x="1140" y="140" text-anchor="middle" class="trans">report</text>
  <text x="1140" y="232" text-anchor="middle" class="transNote">poll Activity API</text>

  <!-- Intro arrow + prep command -->
  <g>
    <circle cx="12" cy="165" r="5" fill="#334155"/>
    <path class="conn" d="M12 165 L30 165" marker-end="url(#ar3)"/>
    <text x="22" y="150" class="trans">prep</text>
  </g>

  <!-- ================== ERROR ROW ================== -->
  <rect class="laneBg" x="10" y="300" width="1300" height="240" rx="10"/>
  <text x="22" y="318" class="sectionLabel">Error &amp; recovery states (drop-down branches)</text>

  <!-- suppressed (from prepped) -->
  <g>
    <rect class="errState" x="30" y="340" width="140" height="72" rx="10"/>
    <text x="100" y="362" text-anchor="middle" class="label">suppressed</text>
    <text x="100" y="380" text-anchor="middle" class="sub">opt-out or bad domain</text>
    <text x="100" y="396" text-anchor="middle" class="note">terminal — never generated</text>
  </g>

  <!-- cooled (from prepped) -->
  <g>
    <rect class="errState" x="30" y="430" width="140" height="72" rx="10"/>
    <text x="100" y="452" text-anchor="middle" class="label">cooled</text>
    <text x="100" y="470" text-anchor="middle" class="sub">inside 30-day window</text>
    <text x="100" y="486" text-anchor="middle" class="note">requeue after cooldown</text>
  </g>

  <!-- parse_failed (from reviewed→merged) -->
  <g>
    <rect class="errState" x="350" y="340" width="140" height="72" rx="10"/>
    <text x="420" y="362" text-anchor="middle" class="label">parse_failed</text>
    <text x="420" y="380" text-anchor="middle" class="sub">reviewed md doesn't</text>
    <text x="420" y="394" text-anchor="middle" class="sub">match parser contract</text>
    <text x="420" y="408" text-anchor="middle" class="note">→ edit Opus output, re-import</text>
  </g>

  <!-- rejected (from approve) -->
  <g>
    <rect class="errState" x="670" y="340" width="140" height="72" rx="10"/>
    <text x="740" y="362" text-anchor="middle" class="label">rejected</text>
    <text x="740" y="380" text-anchor="middle" class="sub">operator declines batch</text>
    <text x="740" y="396" text-anchor="middle" class="note">→ back to generated, fresh Sonnet pass</text>
  </g>

  <!-- send_failed (from sending) -->
  <g>
    <rect class="errState" x="830" y="340" width="140" height="72" rx="10"/>
    <text x="900" y="362" text-anchor="middle" class="label">send_failed</text>
    <text x="900" y="380" text-anchor="middle" class="sub">SendGrid 4xx / 5xx</text>
    <text x="900" y="396" text-anchor="middle" class="note">→ retry per-email, then dead-letter</text>
  </g>

  <!-- bounced (from sent) -->
  <g>
    <rect class="errState" x="990" y="340" width="140" height="72" rx="10"/>
    <text x="1060" y="362" text-anchor="middle" class="label">bounced</text>
    <text x="1060" y="380" text-anchor="middle" class="sub">reported by Activity API</text>
    <text x="1060" y="396" text-anchor="middle" class="note">→ auto-add to suppression list</text>
  </g>

  <!-- Error arrows -->
  <!-- prepped → suppressed -->
  <path class="connErr" d="M90 210 L90 340" marker-end="url(#arRed)"/>
  <text x="96" y="275" class="transErr">filter</text>

  <!-- prepped → cooled -->
  <path class="connErr" d="M110 210 L110 430" marker-end="url(#arRed)"/>
  <text x="116" y="320" class="transErr">cooldown</text>

  <!-- reviewed → parse_failed -->
  <path class="connErr" d="M420 210 L420 340" marker-end="url(#arRed)"/>
  <text x="426" y="275" class="transErr">import fails</text>

  <!-- parse_failed → reviewed (retry) -->
  <path class="connRetry" d="M460 340 C 500 290, 480 240, 460 210" marker-end="url(#arGreen)"/>
  <text x="498" y="278" class="sub" fill="#15803d" font-weight="600">re-import</text>

  <!-- approved → rejected -->
  <path class="connErr" d="M740 210 L740 340" marker-end="url(#arRed)"/>
  <text x="746" y="275" class="transErr">declined</text>

  <!-- rejected → generated (long arc back) -->
  <path class="connRetry" d="M670 376 C 500 420, 320 360, 260 210" marker-end="url(#arGreen)"/>
  <text x="440" y="420" class="sub" fill="#15803d" font-weight="600">regenerate · fresh Sonnet pass</text>

  <!-- sending → send_failed -->
  <path class="connErr" d="M900 210 L900 340" marker-end="url(#arRed)"/>
  <text x="906" y="275" class="transErr">SendGrid error</text>

  <!-- send_failed → sending (retry) -->
  <path class="connRetry" d="M940 340 C 980 290, 960 240, 940 210" marker-end="url(#arGreen)"/>
  <text x="978" y="278" class="sub" fill="#15803d" font-weight="600">retry</text>

  <!-- sent → bounced -->
  <path class="connErr" d="M1060 210 L1060 340" marker-end="url(#arRed)"/>
  <text x="1066" y="275" class="transErr">hard bounce</text>

  <!-- bounced → suppressed (writes to opt-out filter) -->
  <path class="connErr" d="M990 376 C 700 500, 350 520, 170 390" marker-end="url(#arRed)" stroke-dasharray="2 3"/>
  <text x="600" y="520" class="sub" fill="#b91c1c" font-weight="600">auto-suppress for future batches</text>

  <!-- ================== UTILITY COMMANDS ================== -->
  <rect class="laneBg" x="10" y="560" width="1300" height="90" rx="10"/>
  <text x="22" y="578" class="sectionLabel">Utility commands — inspect / mutate without moving a batch</text>

  <g>
    <rect x="30" y="590" width="300" height="50" rx="8" fill="#fff7ed" stroke="#c2410c"/>
    <text x="45" y="610" class="label">batches</text>
    <text x="45" y="627" class="sub">read-only view of every batch's current state</text>
  </g>
  <g>
    <rect x="350" y="590" width="340" height="50" rx="8" fill="#fff7ed" stroke="#c2410c"/>
    <text x="365" y="610" class="label">optout</text>
    <text x="365" y="627" class="sub">append to suppression list → affects future prep runs</text>
  </g>
  <g>
    <rect x="710" y="590" width="580" height="50" rx="8" fill="#f0fdfa" stroke="#0f766e"/>
    <text x="725" y="610" class="label">Durability guarantee</text>
    <text x="725" y="627" class="sub">every state persisted to disk as JSON — a killed process or closed laptop loses zero work</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30,670)">
    <text x="0" y="0" class="legendTitle">Legend</text>
    <rect class="state" x="0" y="10" width="18" height="14" rx="3"/>
    <text x="26" y="22" class="legendT">Automated state</text>

    <rect class="manualState" x="170" y="10" width="18" height="14" rx="3"/>
    <text x="196" y="22" class="legendT">Manual Claude session</text>

    <rect class="humanGate" x="360" y="10" width="18" height="14" rx="3"/>
    <text x="386" y="22" class="legendT">Human gate</text>

    <rect class="terminalOk" x="500" y="10" width="18" height="14" rx="3"/>
    <text x="526" y="22" class="legendT">Terminal (success)</text>

    <rect class="errState" x="660" y="10" width="18" height="14" rx="3"/>
    <text x="686" y="22" class="legendT">Error / exception state</text>

    <line class="connRetry" x1="830" y1="17" x2="868" y2="17" marker-end="url(#arGreen)"/>
    <text x="876" y="22" class="legendT">Recovery transition</text>

    <line class="connErr" x1="1030" y1="17" x2="1068" y2="17" marker-end="url(#arRed)"/>
    <text x="1076" y="22" class="legendT">Error transition</text>
  </g>
</svg>
