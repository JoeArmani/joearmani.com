<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arGov" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .cli { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; }
      .manual { fill: #fef3c7; stroke: #b45309; stroke-width: 2; stroke-dasharray: 6 4; }
      .gate { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2.5; }
      .terminal { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .ext { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; }
      .gov { fill: #f5f3ff; stroke: #6d28d9; stroke-width: 1.5; }
      .art { fill: #ecfccb; stroke: #4d7c0f; stroke-width: 1.25; }
      .conn { stroke: #334155; stroke-width: 2; fill: none; }
      .connDash { stroke: #64748b; stroke-width: 1.25; fill: none; stroke-dasharray: 5 4; }
      .govArrow { stroke: #7c3aed; stroke-width: 1.25; fill: none; stroke-dasharray: 4 3; }
      .label { fill: #0f172a; font-weight: 700; font-size: 16px; }
      .sub { fill: #334155; font-size: 12px; }
      .note { fill: #64748b; font-size: 11px; font-style: italic; }
      .mono { fill: #4338ca; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
      .artMono { fill: #3f6212; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; }
      .title { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 13px; fill: #64748b; }
      .laneLabel { fill: #64748b; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .legendText { fill: #334155; font-size: 12px; }
      .legendTitle { fill: #334155; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
      .tagline { fill: #475569; font-size: 13px; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" class="title">Automated, AI-Generated Email Pipeline</text>
  <text x="600" y="56" text-anchor="middle" class="subtitle">3 review gates · state persisted at every transition · single-file governance</text>

  <!-- External systems lane -->
  <rect x="20" y="72" width="1160" height="58" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="32" y="86" class="laneLabel">External systems</text>
  <g>
    <rect class="ext" x="32" y="92" width="150" height="32" rx="6"/>
    <text x="107" y="113" text-anchor="middle" class="label" font-size="13">Marketing Vendor</text>
  </g>
  <g>
    <rect class="ext" x="200" y="92" width="200" height="32" rx="6"/>
    <text x="300" y="113" text-anchor="middle" class="label" font-size="13">Anthropic API</text>
  </g>
  <g>
    <rect class="ext" x="880" y="92" width="130" height="32" rx="6"/>
    <text x="945" y="113" text-anchor="middle" class="label" font-size="13">Send API</text>
  </g>
  <g>
    <rect class="ext" x="1028" y="92" width="140" height="32" rx="6"/>
    <text x="1098" y="113" text-anchor="middle" class="label" font-size="13">Activity API</text>
  </g>

  <!-- Connection lines from external to pipeline -->
  <path class="connDash" d="M107 124 L97 148" marker-end="url(#arDash)"/>
  <path class="connDash" d="M270 124 L255 148" marker-end="url(#arDash)"/>
  <path class="connDash" d="M330 124 L413 148" marker-end="url(#arDash)"/>
  <path class="connDash" d="M945 124 L887 148" marker-end="url(#arDash)"/>
  <path class="connDash" d="M1098 124 L1045 148" marker-end="url(#arDash)"/>

  <!-- Pipeline lane -->
  <rect x="20" y="140" width="1160" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="32" y="155" class="laneLabel">Pipeline stages</text>

  <!-- prep -->
  <g>
    <rect class="cli" x="32" y="164" width="130" height="130" rx="10"/>
    <text x="97" y="190" text-anchor="middle" class="label">prep</text>
    <text x="97" y="208" text-anchor="middle" class="sub">filter recipients</text>
    <text x="97" y="224" text-anchor="middle" class="sub">enforce cooldown</text>
    <text x="97" y="240" text-anchor="middle" class="sub">tier split</text>
    <text x="97" y="256" text-anchor="middle" class="sub">emit prompt</text>
    <text x="97" y="278" text-anchor="middle" class="note">Python CLI</text>
  </g>

  <path class="conn" d="M162 229 L182 229" marker-end="url(#ar)"/>

  <!-- Sonnet -->
  <g>
    <rect class="manual" x="190" y="164" width="130" height="130" rx="10"/>
    <text x="255" y="190" text-anchor="middle" class="label">Sonnet</text>
    <text x="255" y="208" text-anchor="middle" class="sub">generate drafts</text>
    <text x="255" y="224" text-anchor="middle" class="sub">apply voice rules</text>
    <text x="255" y="240" text-anchor="middle" class="sub">~90 per batch</text>
    <text x="255" y="278" text-anchor="middle" class="note">manual session</text>
  </g>

  <path class="conn" d="M320 229 L340 229" marker-end="url(#ar)"/>

  <!-- Opus -->
  <g>
    <rect class="manual" x="348" y="164" width="130" height="130" rx="10"/>
    <text x="413" y="190" text-anchor="middle" class="label">Opus</text>
    <text x="413" y="208" text-anchor="middle" class="sub">voice check</text>
    <text x="413" y="224" text-anchor="middle" class="sub">tier verification</text>
    <text x="413" y="240" text-anchor="middle" class="sub">rewrite if needed</text>
    <text x="413" y="278" text-anchor="middle" class="note">manual session</text>
  </g>

  <path class="conn" d="M478 229 L498 229" marker-end="url(#ar)"/>

  <!-- import -->
  <g>
    <rect class="cli" x="506" y="164" width="130" height="130" rx="10"/>
    <text x="571" y="190" text-anchor="middle" class="label">import</text>
    <text x="571" y="208" text-anchor="middle" class="sub">parse to JSON</text>
    <text x="571" y="224" text-anchor="middle" class="sub">strict contract</text>
    <text x="571" y="240" text-anchor="middle" class="sub">fail on drift</text>
    <text x="571" y="278" text-anchor="middle" class="note">Python CLI</text>
  </g>

  <path class="conn" d="M636 229 L656 229" marker-end="url(#ar)"/>

  <!-- approve -->
  <g>
    <rect class="gate" x="664" y="164" width="130" height="130" rx="10"/>
    <text x="729" y="190" text-anchor="middle" class="label">approve</text>
    <text x="729" y="208" text-anchor="middle" class="sub">human gate</text>
    <text x="729" y="224" text-anchor="middle" class="sub">final review</text>
    <text x="729" y="240" text-anchor="middle" class="sub">ready-to-send</text>
    <text x="729" y="278" text-anchor="middle" class="note">nothing ships unseen</text>
  </g>

  <path class="conn" d="M794 229 L814 229" marker-end="url(#ar)"/>

  <!-- send -->
  <g>
    <rect class="cli" x="822" y="164" width="130" height="130" rx="10"/>
    <text x="887" y="190" text-anchor="middle" class="label">send</text>
    <text x="887" y="208" text-anchor="middle" class="sub">render HTML</text>
    <text x="887" y="224" text-anchor="middle" class="sub">email dispatch</text>
    <text x="887" y="240" text-anchor="middle" class="sub">jittered delivery</text>
    <text x="887" y="278" text-anchor="middle" class="note">Python CLI</text>
  </g>

  <path class="conn" d="M952 229 L972 229" marker-end="url(#ar)"/>

  <!-- report -->
  <g>
    <rect class="terminal" x="980" y="164" width="130" height="130" rx="10"/>
    <text x="1045" y="190" text-anchor="middle" class="label">report</text>
    <text x="1045" y="208" text-anchor="middle" class="sub">poll Activity API</text>
    <text x="1045" y="224" text-anchor="middle" class="sub">open / click / bounce</text>
    <text x="1045" y="240" text-anchor="middle" class="sub">Excel output</text>
    <text x="1045" y="278" text-anchor="middle" class="note">done</text>
  </g>

  <!-- Artifacts lane -->
  <rect x="20" y="320" width="1160" height="62" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="32" y="334" class="laneLabel">Artifacts persisted to disk</text>
  <g>
    <rect class="art" x="32" y="342" width="130" height="32" rx="6"/>
    <text x="97" y="363" text-anchor="middle" class="artMono">NNN.prep.json</text>
  </g>
  <g>
    <rect class="art" x="190" y="342" width="130" height="32" rx="6"/>
    <text x="255" y="363" text-anchor="middle" class="artMono">NNN.generated.md</text>
  </g>
  <g>
    <rect class="art" x="348" y="342" width="130" height="32" rx="6"/>
    <text x="413" y="363" text-anchor="middle" class="artMono">NNN.reviewed.md</text>
  </g>
  <g>
    <rect class="art" x="506" y="342" width="130" height="32" rx="6"/>
    <text x="571" y="363" text-anchor="middle" class="artMono">NNN.json</text>
  </g>
  <g>
    <rect class="art" x="664" y="342" width="130" height="32" rx="6"/>
    <text x="729" y="363" text-anchor="middle" class="artMono">approved flag</text>
  </g>
  <g>
    <rect class="art" x="822" y="342" width="130" height="32" rx="6"/>
    <text x="887" y="363" text-anchor="middle" class="artMono">NNN.sent.jsonl</text>
  </g>
  <g>
    <rect class="art" x="980" y="342" width="130" height="32" rx="6"/>
    <text x="1045" y="363" text-anchor="middle" class="artMono">NNN.report.xlsx</text>
  </g>

  <!-- Persistence arrows -->
  <path class="connDash" d="M97 294 L97 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M255 294 L255 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M413 294 L413 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M571 294 L571 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M729 294 L729 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M887 294 L887 342" marker-end="url(#arDash)"/>
  <path class="connDash" d="M1045 294 L1045 342" marker-end="url(#arDash)"/>

  <!-- Governance callout -->
  <rect x="20" y="400" width="400" height="56" rx="10" fill="#f5f3ff" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="40" y="424" class="label" fill="#4c1d95" font-size="14">SKILL.md</text>
  <text x="130" y="424" class="sub">Single source of truth for voice + structure</text>
  <text x="40" y="442" class="note">Refined after every batch based on new findings</text>

  <!-- Governance arrows to Sonnet and Opus -->
  <path class="govArrow" d="M220 400 L255 294" marker-end="url(#arGov)"/>
  <path class="govArrow" d="M300 400 L413 294" marker-end="url(#arGov)"/>

  <!-- Iterative refinement callout -->
  <rect x="440" y="400" width="380" height="56" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
  <text x="460" y="424" class="label" fill="#92400e" font-size="14">Iterative refinement</text>
  <text x="460" y="442" class="sub">Each pass tightens rules, catches drift, improves quality</text>

  <!-- Durability callout -->
  <rect x="840" y="400" width="340" height="56" rx="10" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.5"/>
  <text x="860" y="424" class="label" fill="#134e4a" font-size="14">Durable state</text>
  <text x="860" y="442" class="sub">Every stage persists to disk. Interrupted = resumable.</text>

  <!-- Legend -->
  <g transform="translate(20,478)">
    <text x="0" y="12" class="legendTitle">Legend</text>
    <rect class="cli" x="70" y="0" width="18" height="16" rx="3"/>
    <text x="96" y="13" class="legendText">Python CLI</text>
    <rect class="manual" x="195" y="0" width="18" height="16" rx="3"/>
    <text x="221" y="13" class="legendText">Manual Claude session</text>
    <rect class="gate" x="395" y="0" width="18" height="16" rx="3"/>
    <text x="421" y="13" class="legendText">Human gate</text>
    <rect class="terminal" x="520" y="0" width="18" height="16" rx="3"/>
    <text x="546" y="13" class="legendText">Complete</text>
    <rect class="ext" x="630" y="0" width="18" height="16" rx="3"/>
    <text x="656" y="13" class="legendText">External API</text>
    <rect class="art" x="755" y="0" width="18" height="16" rx="3"/>
    <text x="781" y="13" class="legendText">Filesystem artifact</text>
    <rect class="gov" x="910" y="0" width="18" height="16" rx="3"/>
    <text x="936" y="13" class="legendText">Governance</text>

    <text x="1060" y="13" class="tagline">joearmani.com</text>
  </g>
</svg>
